<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Game</title>
    <style>
        body {
            background-color: #bce4a7;
            font-family: 'Arial', sans-serif;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .house {
            width: 100px;
            height: 100px;
            background-color: #8B4513;
            position: relative;
            margin: auto;
        }
        .roof {
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 50px solid #A52A2A;
            position: absolute;
            top: -50px;
            left: 0;
        }
        .garden {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .bed {
            width: 50px;
            height: 50px;
            background-color: #DEB887;
            margin: 5px;
            position: relative;
        }
        .crop {
            width: 30px;
            height: 30px;
            background-color: #32CD32;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Pixel Art Farm Game!</h1>
        <div class="house">
            <div class="roof"></div>
        </div>
        <div class="garden">
            <div class="bed"><div class="crop"></div></div>
            <div class="bed"><div class="crop"></div></div>
            <div class="bed"><div class="crop"></div></div>
        </div>
    </div>
</body>
</html>
